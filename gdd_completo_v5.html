<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Chaos Simulator — Oficial GDD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --secondary: #f43f5e;
      --accent: #fbbf24;
      --radius: 12px;
      --font-main: 'Inter', sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    [data-theme="dark"] {
      --bg-dark: #000000;
      --bg-card: rgba(15, 15, 20, 0.9);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(0, 0, 0, 0.85);
      --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    [data-theme="light"] {
      --bg-dark: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.9);
      --text-main: #0f172a;
      --text-dim: #475569;
      --border: rgba(0, 0, 0, 0.1);
      --nav-bg: rgba(255, 255, 255, 0.9);
      --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-main);
      line-height: 1.6;
      overflow-x: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      min-height: 70px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--nav-bg);
      backdrop-filter: blur(15px);
    }

    .nav-inner {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .nav-item { position: relative; }

    .nav-link {
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.2s;
      padding: 8px 0;
      display: block;
      cursor: pointer;
      text-transform: uppercase;
    }
    .nav-link:hover { color: var(--primary); }

    .sub-nav {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s ease;
    }

    .nav-item:hover .sub-nav {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .sub-nav a {
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 10px 15px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .sub-nav a:hover {
      background: var(--primary);
      color: #fff;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    section {
      padding: 60px 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      border-radius: var(--radius);
      padding: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
      display: inline-block;
    }
    .b-gray { background: #334155; color: #fff; }
    .b-blue { background: #3b82f6; color: #fff; }
    .b-purple { background: #a855f7; color: #fff; }
    .b-yellow { background: #eab308; color: #000; }
    .b-red { background: #ef4444; color: #fff; }
    .b-black { background: #000; color: #fff; border: 1px solid #333; }

    @media (max-width: 600px) {
      .nav-links { gap: 0.8rem; }
      .nav-link { font-size: 0.7rem; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-top">
      <div style="font-family:var(--font-title); font-weight:900; font-size:1.1rem; color:var(--primary)">ANIME CHAOS SIMULATOR</div>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>
    <div class="nav-links">
      <div class="nav-item">
        <span class="nav-link">Simulador</span>
        <div class="sub-nav">
          <a href="#sim">Estatísticas</a>
          <a href="#passives">Passivas</a>
        </div>
      </div>
      <div class="nav-item">
        <span class="nav-link">Tower Defense</span>
        <div class="sub-nav">
          <a href="#td">Defesa Principal</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<header class="hero">
  <h1>GDD COMPLETO</h1>
  <p>Documento de Design de Jogo e Balanceamento</p>
</header>

<main>
  <section id="sim">
    <div class="card-grid">
      <div class="card">
        <h3>Shanks (Secreto)</h3>
        <span class="badge b-black">Secreto</span>
        <p style="font-size:12px; margin-top:10px; color:var(--text-dim)">Growth: 3.37 Base / 10.12 Raid</p>
      </div>
    </div>
  </section>
</main>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
