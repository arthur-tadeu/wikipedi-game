<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Chaos Simulator — Oficial GDD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #f43f5e;
      --accent: #fbbf24;
      --bg-dark: #000000;
      --bg-card: rgba(15, 15, 20, 0.9);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
    }

    [data-theme="light"] {
      --bg-dark: #f8fafc;
      --bg-card: rgba(255, 255, 255, 0.9);
      --text-main: #0f172a;
      --text-dim: #475569;
      --border: rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

    /* REVEAL ANIMATION */
    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    nav { position: fixed; top: 0; left: 0; right: 0; min-height: 70px; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
    .nav-inner { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; }

    .badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 700; text-transform: uppercase; display: inline-block; }
    .b-blue { background: #3b82f6; color: #fff; }
    .b-red { background: #ef4444; color: #fff; }
    .b-black { background: #000; color: #fff; border: 1px solid #333; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div style="font-weight:900; color:var(--primary)">ANIME CHAOS SIMULATOR GDD</div>
    <button onclick="toggleTheme()" style="background:none; border:1px solid var(--border); color:var(--text-main); padding:5px 10px; border-radius:20px; cursor:pointer">🌓 Tema</button>
  </div>
</nav>

<header style="height:40vh; display:flex; align-items:center; justify-content:center; text-align:center; padding-top:70px">
  <h1 class="reveal">Documento de Passivas</h1>
</header>

<main>
  <section class="reveal">
    <div class="card-grid">
      <!-- PASSIVAS -->
      <div class="card">
        <h3>Heart Good</h3>
        <span class="badge b-blue">Suporte</span>
        <p style="font-size:12px; color:var(--text-dim); margin-top:10px">-100% Dano Próprio | +50% Dano Aliados.</p>
      </div>
      <div class="card">
        <h3>Golem</h3>
        <span class="badge b-red">Tanque</span>
        <p style="font-size:12px; color:var(--text-dim); margin-top:10px">+60% Dano | -35% Atk Speed.</p>
      </div>
      <div class="card">
        <h3>The Egoist</h3>
        <span class="badge b-black">Solo</span>
        <p style="font-size:12px; color:var(--text-dim); margin-top:10px">-70% Dano Aliados | +100% Dano Próprio | +5x Mult.</p>
      </div>
    </div>
  </section>
</main>

<script>
function toggleTheme() {
  const h=document.documentElement; const n=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',n); localStorage.setItem('theme',n);
}
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
