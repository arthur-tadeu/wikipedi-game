<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Chaos Multiverse — Game Design Document</title>
</head>
<body>
<style>
:root {
  --color-background-primary: #1e1e1e;
  --color-background-secondary: #2a2a2a;
  --color-background-tertiary: #181818;
  --color-border-secondary: #3e3e42;
  --color-border-tertiary: #3a3a3a;
  --color-text-primary: #e0e0e0;
  --color-text-secondary: #cccccc;
  --color-text-tertiary: #999999;
  --border-radius-md: 6px;
  --border-radius-lg: 8px;
  --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
  background-color: var(--color-background-primary);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
}
*{box-sizing:border-box;margin:0;padding:0}
.w{padding:1.5rem 2rem; max-width: 900px; margin: 0 auto; font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.tab.active{background:var(--color-background-secondary);color:#fff;font-weight:600;border-color:#555}
.panel{display:none}.panel.active{display:block}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:14px; border: 1px solid var(--color-border-tertiary); box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
.card2{background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px}
.sec{font-size:11px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.badge{font-size:11px;padding:3px 8px;border-radius:12px;white-space:nowrap; font-weight: 600; background: #fff; border: 1px solid #ccc; display: inline-block;}
.b-gray{color:#555}
.b-blue{color:#0C447C}
.b-coral{color:#A13D1C}
.b-purple{color:#3C3489}
.b-teal{color:#0B755F}
.b-w{color:#8A4E08}
.b-e{color:#A62A2A}
.b-green{color:#3A780F}
.row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.rl{width:90px;color:var(--color-text-tertiary);flex-shrink:0;font-size:12px}
.bwrap{flex:1;background:var(--color-background-tertiary);border-radius:4px;height:18px;overflow:hidden; border: 1px solid #111;}
.bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;min-width:24px;}
.rv{width:40px;text-align:right;color:var(--color-text-secondary);font-size:12px;flex-shrink:0; font-weight: 500;}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:12px;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border-secondary);font-weight:600; background: rgba(0,0,0,0.2)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.obs{background:rgba(255, 170, 0, 0.1);border-left:3px solid #ffaa00;border-radius:0 6px 6px 0;padding:10px 12px;font-size:12px;color:#ffcc66;margin:10px 0}
.info{background:rgba(0, 153, 255, 0.1);border-left:3px solid #0099ff;border-radius:0 6px 6px 0;padding:10px 12px;font-size:12px;color:#66c2ff;margin:10px 0}
.ctrl{display:flex;flex-direction: column;gap:12px;margin-bottom:1.5rem;}
.ctrl-row{display:flex; flex-direction:column; gap:6px;}
.ctrl-label{font-size:12px;color:var(--color-text-secondary);}
select{font-size:14px;padding:8px 12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-tertiary);color:var(--color-text-primary); cursor:pointer; width: 100%; font-weight: 500;}
.up-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--color-border-tertiary);align-items:flex-start}
.up-row:last-child{border-bottom:none}
.up-num{width:26px;height:26px;border-radius:50%;background:var(--color-background-tertiary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--color-text-primary);flex-shrink:0; margin-top: 2px;}
.up-body{flex:1}
.up-title{font-size:13px;font-weight:600;color:var(--color-text-primary)}
.stat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
</style>

<div class="w">
<div class="tabs">
  <button class="tab active" onclick="showTab('sim')">Simulador</button>
  <button class="tab" onclick="showTab('td')">Tower Defense</button>

</div>
<div id="sim-body"></div>
</div>

<!-- TOWER DEFENSE -->
<div id="tab-td" class="panel">
<div class="ctrl">
  <div class="ctrl-row">
    <label class="ctrl-label" for="tdchar">Personagem:</label>
    <select id="tdchar" onchange="renderTD()">
      <option value="0">Nami</option><option value="1">Koby</option><option value="2">Usopp</option>
      <option value="3">Buggy</option><option value="4">Zoro</option><option value="5">Luffy</option><option value="6">Shanks</option>
    </select>
  </div>
</div>
<div id="td-body"></div>
</div>

<!-- RAIDS -->
<div id="tab-raids" class="panel">
<div id="raids-body"></div>
</div>

<!-- NPCS -->
<div id="tab-npcs" class="panel">
<div id="npcs-body"></div>
</div>

<!-- ASCENSÃO -->
<div id="tab-asc" class="panel">
<div id="asc-body"></div>
</div>

<!-- ECONOMIA -->
<div id="tab-eco" class="panel">
<div id="eco-body"></div>
</div>

<!-- ROLL -->
<div id="tab-roll" class="panel">
<div id="roll-body"></div>
</div>

<!-- PROGRESSÃO -->
<div id="tab-prog" class="panel">
<div class="ctrl">
  <div class="ctrl-row">
    <label class="ctrl-label" for="prar">Raridade:</label>
    <select id="prar" onchange="renderProg()">
      <option value="0">Common (1x)</option>
      <option value="1">Raro (1.5x)</option>

      <option value="5">Secreto (7.59x)</option>
    </select>

</div>

</div>

<!-- PETS -->
<div id="tab-pets" class="panel">
<div class="ctrl">
  <div class="ctrl-row">
    <label class="ctrl-label" for="plv">Nível do Pet:</label>
    <select id="plv" onchange="renderPets()">
      <option value="1">Lv 1</option>
      <option value="2">Lv 2</option>
      <option value="3">Lv 3</option>
      <option value="4">Lv 4</option>
      <option value="5">Lv 5</option>
      <option value="6">Lv 6</option>
      <option value="7">Lv 7</option>
      <option value="8">Lv 8</option>
      <option value="9">Lv 9</option>
      <option value="10">Lv 10</option>
    </select>
  </div>
</div>
<div id="pets-body"></div>
</div>
</div>

<script>
// ===================== DADOS =====================
const SIM = [
  { name:'Nami',  rar:'Common',  rc:'b-gray',  arch:'Farmer/Air',   ac:'b-teal',
    col:'#85B7EB',ct:'#0C447C',
    base:{dmg:3,mult:3.5,hits:10},raid:{dmg:5,mult:4,hits:8},
    growType:'exp', growBase:0.3, growRaid:0.3,
    note:'Crescimento exponencial — fraca, mas escala. Leva vários minutos para matar um boss, mesmo no Lv10.' },
  { name:'Koby',  rar:'Common',  rc:'b-gray',  arch:'Suporte/Canhão',ac:'b-blue',
    col:'#B5D4F4',ct:'#0C447C',
    base:{dmg:5,mult:2,hits:5},raid:{dmg:8,mult:3,hits:4},

    note:'Canhão no simulador. No TD, vira suporte de buff.' },
  { name:'Usopp', rar:'Raro',    rc:'b-blue',  arch:'Assassino',    ac:'b-e',
    col:'#9FE1CB',ct:'#085041',
    base:{dmg:1,mult:16,hits:3},raid:{dmg:1.5,mult:18,hits:3},
    growType:'exp', growBase:0.5, growRaid:0.5,
    note:'Dano base mínimo. Ult absurda. 3 hits = ulta rápido, mas causa pouco dano sem ultar.' },
  { name:'Buggy', rar:'Épico',   rc:'b-coral', arch:'DPS Estável',  ac:'b-w',
    col:'#F5C4B3',ct:'#712B13',
    base:{dmg:8,mult:4.5,hits:10},raid:{dmg:12,mult:5,hits:8},
    growType:'exp', growBase:0.8, growRaid:1.2,
    note:'DPS constante. Hits para ultar aumentaram para 10 — ult mais rara, mas mais impactante.' },
  { name:'Zoro',  rar:'Lendário',rc:'b-w',     arch:'Solo Bleed',   ac:'b-coral',
    col:'#EF9F27',ct:'#633806',
    base:{dmg:14,mult:3.5,hits:4},raid:{dmg:20,mult:5,hits:4},
    growType:'exp', growBase:1.0, growRaid:2.0,
    note:'Bleed contínuo. Ult rápida (4 hits). Sem ult no TD.' },
  { name:'Luffy', rar:'Mítico',  rc:'b-purple',arch:'Canhão Pesado', ac:'b-purple',
    col:'#CECBF6',ct:'#3C3489',
    base:{dmg:18,mult:12,hits:22},raid:{dmg:21,mult:15,hits:22},
    growType:'exp', growBase:1.8, growRaid:2.1,
    note:'22 hits para ultar — muito difícil. Quando ulta, devastação total.' },
  { name:'Shanks',rar:'Secreto', rc:'b-e',     arch:'O Mais Forte', ac:'b-e',
    col:'#F0997B',ct:'#712B13',
    base:{dmg:25,mult:10,hits:8},raid:{dmg:50,mult:20,hits:14},
    growType:'exp', growBase:2.5, growRaid:5.0,
    note:'Bleed + Stun. Pós-raid monstruoso, mas 14 hits o equilibram.' },
];

function dmgLv(c,phase,lv){
  const s=phase==='raid'?c.raid:c.base;
  const g=phase==='raid'?c.growRaid:c.growBase;
  // exponencial suave: base + g*(lv-1)^1.15
  return +(s.dmg + g*Math.pow(lv-1,1.15||1)).toFixed(2);
}
function ultLv(c,phase,lv){ return +(dmgLv(c,phase,lv)*(phase==='raid'?c.raid.mult:c.base.mult)).toFixed(1); }

function renderSim(){
  const lv=parseInt(document.getElementById('slv').value);
  const phase=document.getElementById('sph').value;
  const isShiny=document.getElementById('sshiny') ? document.getElementById('sshiny').value === 'shiny' : false;
  const maxD=dmgLv(SIM[6],phase,lv) * (isShiny ? 1.5 : 1), maxU=ultLv(SIM[6],phase,lv) * (isShiny ? 1.5 : 1);
  let html='';
  SIM.forEach(c=>{
    let d=dmgLv(c,phase,lv), u=ultLv(c,phase,lv);
    if(isShiny) { d *= 1.5; u *= 1.5; }
    const s=phase==='raid'?c.raid:c.base;
    const dw=Math.min(97,(d/maxD)*100), uw=Math.min(97,(u/maxU)*100);
    
    // Formatação para no máximo 1 casa decimal
    const dStr = Number(d.toFixed(1));
    const uStr = Number(u.toFixed(1));

    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:4px">
        <span style="font-size:15px;font-weight:700;color:var(--color-text-primary)">${c.name} <span style="font-weight:500;font-size:12px;color:var(--color-text-tertiary)">${c.rar}</span></span>
        <div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge ${c.rc}">${c.rar}</span><span class="badge ${c.ac}">${c.arch}</span></div>
      </div>
      <div class="row"><span class="rl">Dano base</span><div class="bwrap"><div class="bar" style="width:${dw}%;background:${c.col};color:${c.ct}">${dStr}</div></div><span class="rv">${dStr}</span></div>
      <div class="row"><span class="rl">Dano ult</span><div class="bwrap"><div class="bar" style="width:${uw}%;background:#EF9F27;color:#633806">${uStr}</div></div><span class="rv">${uStr}</span></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--color-text-tertiary)">
        <span>Hits ult: <b style="color:var(--color-text-primary)">${s.hits}</b></span>
        <span>Mult: <b style="color:var(--color-text-primary)">${s.mult}x</b></span>
        <span>Crescimento: <b style="color:var(--color-text-primary)">exp +${phase==='raid'?c.growRaid:c.growBase}/nível</b></span>
      </div>
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:12px;border-top:1px solid var(--color-border-tertiary);padding-top:10px">${c.note}</div>
    </div>`;
  });
  document.getElementById('sim-body').innerHTML=html;
}

function renderTD(){
  const ci=parseInt(document.getElementById('tdchar').value);
  const c=TD[ci];
  let html=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">
      <span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${c.name}</span>

        <span class="badge ${c.rc}">${c.rar}</span>

        <span class="badge b-purple">${c.max_up+1} upgrades</span>
      </div>
    </div>
    <div style="font-size:11px;color:var(--color-text-tertiary)">${c.note}</div>
  </div>`;

  c.ups.forEach(u=>{
    const dps=Number((u.dmg/u.cd).toFixed(1));
    // DPS efetivo: considera dano dos ticks de bleed/burn

    const dpsEfetivo = dmgEfetivo ? Number((dmgEfetivo/u.cd).toFixed(1)) : null;
    html+=`<div class="card2">
      <div class="up-row" style="border:none;padding:0">
        <div class="up-num" style="background:${c.col};color:${u.n===c.max_up?'#fff':c.col};filter:brightness(${u.n===c.max_up?0.7:1.2})">${u.n}</div>

          <div class="stat-chips">
            <span class="badge b-blue">Range ${u.range}</span>
            <span class="badge b-gray">CD ${u.cd}s</span>
            <span class="badge b-w">Dano ${u.dmg}</span>
            <span class="badge b-green">DPS ${dps}</span>
            ${dpsEfetivo ? `<span class="badge b-coral" title="Inclui dano dos ticks de efeito">DPS Efetivo ${dpsEfetivo} ⚡</span>` : ''}

function showTab(id){
  const ids=['sim','td','raids','npcs','asc','eco','roll','prog','pets'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='td') renderTD();
  if(id==='raids') renderRaids();
  if(id==='npcs') renderNpcs();
  if(id==='asc') renderAsc();
  if(id==='eco') renderEco();
  if(id==='roll') renderRoll();
  if(id==='prog') renderProg();
  if(id==='pets') renderPets();
}

function renderProg() {
  const rarIdx = parseInt(document.getElementById('prar')?.value || 0);
  const mult = Math.pow(1.5, rarIdx);
  
  const baseData = [
    { trans: 'Lv1 → Lv2', xp: 48 },
    { trans: 'Lv2 → Lv3', xp: 101 },
    { trans: 'Lv3 → Lv4', xp: 212 },

    { trans: 'Lv8 → Lv9', xp: 8645 },
    { trans: 'Lv9 → Lv10', xp: 18155 }
  ];

  const formatTime = (min) => {
    if (min < 1) return '0min';
    if (min < 60) return Math.round(min) + 'min';
    const h = Math.floor(min / 60);
    const m = Math.round(min % 60);
    return m > 0 ? `${h}h ${m}min` : `${h}h`;
  };

  const rates = [60, 120, 240]; // XP/min for 1, 2, 4 stars

  let html = `<div class="card">

    <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:12px">
      XP base multiplicado por <b style="color:var(--color-text-primary)">${mult.toFixed(2)}x</b> (raridade).
      Estimativas: 1⭐=60 XP/min | 2⭐=120 XP/min | 4⭐=240 XP/min.
    </div>
    <table class="tbl">
      <thead>
        <tr>
          <th>Transição</th>
          <th>XP necessário</th>
          <th>1⭐</th>
          <th>2⭐</th>
          <th>4⭐</th>
        </tr>
      </thead>
      <tbody>
        ${baseData.map(d => {
          const xp = Math.round(d.xp * mult);
          return `<tr>
            <td>${d.trans}</td>
            <td style="font-weight:600">${xp.toLocaleString()} XP</td>
            <td><span class="badge b-gray">${formatTime(xp / rates[0])}</span></td>
            <td><span class="badge b-blue">${formatTime(xp / rates[1])}</span></td>
            <td><span class="badge b-purple">${formatTime(xp / rates[2])}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="obs" style="margin-top:12px">Cada raridade exige +50% de XP que a anterior. Um Mítico precisa de ~5x mais XP que um Common para o mesmo nível.</div>
  </div>`;
  document.getElementById('prog-body').innerHTML = html;
}

function renderPets() {
  const lv = parseInt(document.getElementById('plv').value);
  let html = '';
  
  PETS.forEach(p => {
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700;color:var(--color-text-primary)">${p.name} <span style="font-weight:400;font-size:11px;color:var(--color-text-tertiary)">Pet de Assistência</span></span>
        <span class="badge b-purple">Lv ${lv}</span>
      </div>
      
      <div class="sec">Assistência (${p.dist})</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">
        ${p.assist} | <b style="color:var(--color-text-primary)">Cooldown: ${p.cd}</b>
      </div>

      <div class="sec">Buffs (Status Base)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${Object.entries(p.buff).map(([k, v]) => {
          const val = (v / 10 * lv).toFixed(2);
          const color = v > 0 ? 'b-green' : 'b-e';
          return `<span class="badge ${color}">${k}: ${v > 0 ? '+' : ''}${val}%</span>`;
        }).join('')}
        ${p.passive ? Object.entries(p.passive).map(([k, v]) => {
          const val = (v / 10 * lv).toFixed(2);
          return `<span class="badge b-blue">${k}: ${val}% (Passiva)</span>`;
        }).join('') : ''}
      </div>

      <div class="sec">Ascensão (Máximo)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${Object.entries(p.asc).map(([k, v]) => {
          const color = v > 0 ? 'b-teal' : 'b-coral';
          return `<span class="badge ${color}">${k}: ${v > 0 ? '+' : ''}${v}%</span>`;
        }).join('')}
        ${p.asc_passive ? Object.entries(p.asc_passive).map(([k, v]) => {
          return `<span class="badge b-w">${k}: ${v}% (Passiva)</span>`;
        }).join('') : ''}
      </div>
    </div>`;
  });
  
  document.getElementById('pets-body').innerHTML = html;
}
